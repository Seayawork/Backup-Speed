<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon-C49brna2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <script>
      localStorage.theme = 'light';
      document.querySelector('html').classList.remove('dark');
      document.querySelector('html').style.colorScheme = 'light';
    </script>
    <script>
      // App routes start at /dashboard/:factory; redirect bare "/" to a default factory.
      (function () {
        var p = window.location.pathname || "/";
        if (p === "/" || p === "") {
          window.location.replace("./dashboard/factory1");
        }
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-CcF2X3Th.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BzrxWgtL.css">
  </head>
  <body class="font-inter antialiased bg-gray-100 dark:bg-neutral-900/90 text-gray-600 dark:text-neutral-400">
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <script>
        if (localStorage.getItem('sidebar-expanded') == 'true') {
            document.querySelector('body').classList.add('sidebar-expanded');
        } else {
            document.querySelector('body').classList.remove('sidebar-expanded');
        }
    </script>   
    <div id="root"></div>
  </body>
</html>
